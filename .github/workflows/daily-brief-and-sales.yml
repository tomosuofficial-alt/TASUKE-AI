# PCオフでも毎朝 7:00 JST: (1)今日の予定＋案件進捗 → (2)スマレジ売上→Notionクライアント売上DB → (3)ニュース＆ひとこと
# よいどころ千福は深夜営業（18:00〜翌4:00）想定。前日 sum_date の日次が揃いやすいのは翌朝7時頃。
# ② は毎回自動で Notion に書き込む（手動依頼不要・同日は重複スキップ）。
# 各ステップは独立。失敗しても後続を実行する。Slack へは①②③の各スクリプトが個別に投稿（実行サマリは送らない）。
#
# Secrets: NOTION_TOKEN, SLACK_DAILY_COMMAND_WEBHOOK_URL,
#   SMAREGI_CLIENT_ID, SMAREGI_CLIENT_SECRET, SMAREGI_CONTRACT_ID
# 任意: NOTION_SCHEDULE_* , NOTION_LINE_INBOX_*（LINE→Notion 取り込みDB）
name: Daily morning 7:00 (#daily-command)

on:
  schedule:
    # 毎日 22:00 UTC = 翌日 07:00 JST（サマータイムなし）
    - cron: '0 22 * * *'
  workflow_dispatch:

concurrency:
  group: daily-brief-and-sales
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      # ①②③ を順実行（途中失敗でも続行）。Slack は各ステップの本文のみ。
      - name: '①②③ Morning pipeline'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          SLACK_DAILY_COMMAND_WEBHOOK_URL: ${{ secrets.SLACK_DAILY_COMMAND_WEBHOOK_URL }}
          NOTION_SCHEDULE_DB_ID: ${{ secrets.NOTION_SCHEDULE_DB_ID }}
          NOTION_SCHEDULE_DATE_PROP: ${{ secrets.NOTION_SCHEDULE_DATE_PROP }}
          NOTION_SCHEDULE_TITLE_PROP: ${{ secrets.NOTION_SCHEDULE_TITLE_PROP }}
          NOTION_LINE_INBOX_DB_ID: ${{ secrets.NOTION_LINE_INBOX_DB_ID }}
          NOTION_LINE_INBOX_DATE_PROP: ${{ secrets.NOTION_LINE_INBOX_DATE_PROP }}
          NOTION_LINE_INBOX_SUMMARY_PROP: ${{ secrets.NOTION_LINE_INBOX_SUMMARY_PROP }}
          NOTION_LINE_INBOX_PARTNER_PROP: ${{ secrets.NOTION_LINE_INBOX_PARTNER_PROP }}
          NOTION_LINE_INBOX_DONE_PROP: ${{ secrets.NOTION_LINE_INBOX_DONE_PROP }}
          NOTION_LINE_INBOX_WINDOW_DAYS: ${{ secrets.NOTION_LINE_INBOX_WINDOW_DAYS }}
          SMAREGI_CLIENT_ID: ${{ secrets.SMAREGI_CLIENT_ID }}
          SMAREGI_CLIENT_SECRET: ${{ secrets.SMAREGI_CLIENT_SECRET }}
          SMAREGI_CONTRACT_ID: ${{ secrets.SMAREGI_CONTRACT_ID }}
          SMAREGI_EMPTY_RETRIES: '4'
          SMAREGI_EMPTY_RETRY_MS: '60000'
        run: npm run morning:ci
